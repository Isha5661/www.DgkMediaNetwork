<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form - DGK Media Network</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form action="https://formspree.io/f/mrewyjdo" method="POST" id="regForm">
        <h1>Member Registration</h1>

        <div class="tab">
            <p>Full Name *</p>
            <input type="text" placeholder="First Name" name="fname" required>
            <input type="text" placeholder="Last Name" name="lname" required>
        </div>

        <div class="tab">
            <p>Contact Info *</p>
            <input type="email" placeholder="Email Address" name="email" required>
            <input type="text" placeholder="Phone Number" name="phone" required>
        </div>

        <div style="margin-top:20px;">
            <button type="button" id="prevBtn" onclick="nextPrev(-1)">Previous</button>
            <button type="button" id="nextBtn" onclick="nextPrev(1)">Next</button>
        </div>
        <!-- Naya Tab: City aur Education -->
<div class="tab">
    <p>City & Education *</p>
    <input type="text" placeholder="Your City" name="city" required>
    <input type="text" placeholder="Education" name="education" required>
</div>
    </form>
<script>
    var currentTab = 0;
    showTab(currentTab);

    function showTab(n) {
        var x = document.getElementsByClassName("tab");
        x[n].style.display = "block";
        if (n == 0) document.getElementById("prevBtn").style.display = "none";
        else document.getElementById("prevBtn").style.display = "inline";
        if (n == (x.length - 1)) document.getElementById("nextBtn").innerHTML = "Submit";
        else document.getElementById("nextBtn").innerHTML = "Next";
    }

    function nextPrev(n) {
        var x = document.getElementsByClassName("tab");
        if (n == 1 && !validateForm()) return false;
        x[currentTab].style.display = "none";
        currentTab = currentTab + n;
        if (currentTab >= x.length) { document.getElementById("regForm").submit(); return false; }
        showTab(currentTab);
    }
    
    function validateForm() { return true; } // Filhal simple rakha hai
</script>
</body>
</html>
